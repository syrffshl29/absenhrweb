<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HR Attendance</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-card {
            background-color: #ffffff;
            width: 100%;
            max-width: 450px;
            border-radius: 1rem;
            padding: 2.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .brand-icon {
            font-size: 3rem;
            color: #094067;
            margin-bottom: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            background-color: #f0f7ff;
            border-radius: 50%;
        }

        .login-header h3 {
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
        }

        .login-header p {
            color: #718096;
            font-size: 0.95rem;
        }

        .input-group {
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            transition: all 0.3s ease;
            background: #f8fafc;
        }

        .input-group:focus-within {
            border-color: #3da9fc;
            box-shadow: 0 0 0 3px rgba(61, 169, 252, 0.15);
            background: #ffffff;
        }

        .input-group-text {
            background: transparent;
            border: none;
            color: #a0aec0;
            padding-left: 1rem;
        }

        .form-control {
            border: none;
            background: transparent;
            padding: 0.8rem 1rem;
            font-size: 1rem;
        }

        .form-control:focus {
            box-shadow: none;
            background: transparent;
        }

        .form-label {
            font-size: 0.875rem;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 0.5rem;
        }

        .password-toggle {
            cursor: pointer;
            padding-right: 1rem;
            display: flex;
            align-items: center;
            color: #a0aec0;
            transition: color 0.2s;
        }

        .password-toggle:hover {
            color: #4a5568;
        }

        .btn-primary {
            background-color: #094067;
            border-color: #094067;
            padding: 0.875rem;
            font-weight: 600;
            border-radius: 0.5rem;
            letter-spacing: 0.3px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #001a33;
            border-color: #001a33;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(9, 64, 103, 0.2);
        }

        .alert-danger {
            background-color: #fff5f5;
            border: 1px solid #fed7d7;
            color: #c53030;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

    </style>
</head>

<body>

<div class="login-card">

    <div class="login-header">
        <div class="brand-icon">
            <i class="bi bi-buildings"></i>
        </div>
        <h3>Enterprise Attendance</h3>
        <p>Please sign in to your HR account</p>
    </div>

    <div th:if="${error}" class="alert alert-danger py-2 mb-4" role="alert">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span th:text="${error}"></span>
    </div>

    <form th:action="@{/login}" th:object="${loginRequest}" method="post">

        <button type="submit" class="btn btn-primary w-100 d-flex justify-content-center align-items-center gap-2">
            <span>Sign In</span>
            <i class="bi bi-box-arrow-in-right"></i>
        </button>

    </form>

    <div class="mt-4 text-center">
        <small class="text-muted">Protected by Enterprise Grade Security</small>
    </div>

</div>

<script>
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#password');
    const toggleIcon = togglePassword.querySelector('i');

    togglePassword.addEventListener('click', function (e) {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);

        toggleIcon.classList.toggle('bi-eye');
        toggleIcon.classList.toggle('bi-eye-slash');
    });
</script>
</body>

</html>
