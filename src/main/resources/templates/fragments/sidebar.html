<div th:fragment="sidebar" class="offcanvas-md offcanvas-start flex-shrink-0 bg-white min-vh-100 p-3 border-end d-flex flex-column shadow-sm" tabindex="-1" id="sidebarMenuResponsive" style="width: 260px;">

    <div class="d-flex justify-content-between align-items-center mb-4 mt-2 px-2">
        <div class="d-flex align-items-center">
            <div class="bg-primary rounded-3 me-3 d-flex justify-content-center align-items-center" style="width: 40px; height: 40px;">
                <i class="bi bi-layers-fill text-white fs-5"></i>
            </div>
            <h5 class="fw-bold text-dark mb-0 fs-5" style="letter-spacing: -0.5px;">AbsenHR</h5>
        </div>
        <button type="button" class="btn-close d-md-none" data-bs-dismiss="offcanvas" data-bs-target="#sidebarMenuResponsive" aria-label="Close"></button>
    </div>

    <!-- Menu List -->
    <ul class="nav flex-column flex-grow-1" id="sidebarMenu">

        <!-- ADMIN MENU -->
        <th:block th:if="${session.ROLE == 'ADMIN'}">
            <li class="nav-item">
                <a class="nav-link sidebar-link px-3 py-2 d-flex align-items-center" th:href="@{/dashboard}">
                    <i class="bi bi-grid me-3"></i> Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link sidebar-link px-3 py-2 d-flex align-items-center" th:href="@{/employees}">
                    <i class="bi bi-people me-3"></i> Employee
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link sidebar-link px-3 py-2 d-flex align-items-center" th:href="@{/report}">
                    <i class="bi bi-file-earmark-text me-3"></i> Report
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link sidebar-link px-3 py-2 d-flex align-items-center" th:href="@{/report/late-summary}">
                    <i class="bi bi-file-earmark-text me-3"></i> Late Summary
                </a>
            </li>

        </th:block>

        <!-- EMPLOYEE MENU -->
        <th:block th:if="${session.ROLE == 'EMPLOYEE'}">
            <li class="nav-item">
                <a class="nav-link sidebar-link px-3 py-2 d-flex align-items-center" th:href="@{/attendance}">
                    <i class="bi bi-calendar-check me-3"></i> Absensi
                </a>
            </li>
        </th:block>

        <th:block th:if="${session.ROLE == 'EMPLOYEE'}">
            <li class="nav-item">
                <a class="nav-link sidebar-link px-3 py-2 d-flex align-items-center" th:href="@{/profile}">
                    <i class="bi bi-calendar-check me-3"></i> Profile
                </a>
            </li>
        </th:block>

    </ul>

    <div class="mt-auto">
        <ul class="nav flex-column border-top pt-3">
            <li class="nav-item">
                <a class="nav-link sidebar-link text-danger px-3 py-2 d-flex align-items-center" th:href="@{/logout}">
                    <i class="bi bi-box-arrow-left me-3"></i> Keluar
                </a>
            </li>
        </ul>
    </div>

    <style>
        .sidebar-link {
            color: #64748b;
            transition: all 0.2s ease;
            border-radius: 0.5rem;
            font-weight: 500;
            margin-bottom: 0.35rem;
        }

        .sidebar-link:hover {
            background-color: #f1f5f9;
            color: #334155;
        }

        .sidebar-link.active-menu {
            background-color: #eff6ff;
            color: #3b82f6;
        }

        .sidebar-link.active-menu i {
            color: #3b82f6 !important;
        }

        .sidebar-link i {
            font-size: 1.15rem;
            color: #94a3b8;
            transition: color 0.2s ease;
        }

        .sidebar-link:hover i {
            color: #64748b;
        }
    </style>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var currentPath = window.location.pathname;

            var links = document.querySelectorAll('#sidebarMenu .sidebar-link');

            links.forEach(function (link) {
                var href = link.getAttribute('href');

                if (href && currentPath.startsWith(href)) {
                    link.classList.add('active-menu');
                }
            });
        });
    </script>
</div>
