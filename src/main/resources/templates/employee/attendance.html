<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>HR Attendance</title>

    <link rel="stylesheet"
          href="/webjars/bootstrap/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body class="bg-light">

<div class="container-fluid">

    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 p-0">
            <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        </div>

        <!-- Content -->
        <div class="col-md-10">

<div class="d-flex">

    <!-- ================= CONTENT ================= -->

    <div class="flex-grow-1">

        <!-- NAVBAR -->

        <nav class="navbar navbar-light bg-white shadow-sm">

            <div class="container-fluid">

                <span class="navbar-brand fw-bold">

                    Employee Attendance

                </span>

                <span class="fw-bold"
                      th:text="${dashboard.employeeName}">
                </span>

            </div>

        </nav>

        <div class="container-fluid mt-4">

            <!-- ================= DASHBOARD ================= -->

            <div class="row mb-4">

                <div class="col-md-4">

                    <div class="card shadow border-0">

                        <div class="card-body text-center">

                            <h6>Total Attendance</h6>

                            <h2 class="text-primary"
                                th:text="${dashboard.totalAttendance}">
                            </h2>

                        </div>

                    </div>

                </div>

                <div class="col-md-4">

                    <div class="card shadow border-0">

                        <div class="card-body text-center">

                            <h6>Present</h6>

                            <h2 class="text-success"
                                th:text="${dashboard.totalPresent}">
                            </h2>

                        </div>

                    </div>

                </div>

                <div class="col-md-4">

                    <div class="card shadow border-0">

                        <div class="card-body text-center">

                            <h6>Late</h6>

                            <h2 class="text-danger"
                                th:text="${dashboard.totalLate}">
                            </h2>

                        </div>

                    </div>

                </div>

            </div>

            <!-- ================= CHECK IN ================= -->

            <div class="card shadow border-0 mb-4">

                <div class="card-header fw-bold">

                    Attendance

                </div>

                <div class="card-body">

                    <div class="row">

                        <div class="col-md-8">

                            <form th:action="@{/attendance/checkin}"
                                  method="post"
                                  id="checkInForm">

                                <div class="input-group">

                                    <input
                                            type="hidden"
                                            id="location"
                                            name="location">

                                    <button
                                            class="btn btn-success"
                                            type="submit">

                                        <i class="bi bi-geo-alt-fill"></i>
                                        Check In

                                    </button>

                                </div>

                            </form>

                        </div>

                        <div class="col-md-4">

                            <form th:action="@{/attendance/checkout}"
                                  method="post">

                                <button
                                        class="btn btn-danger w-100"
                                        type="submit">

                                    <i class="bi bi-box-arrow-left"></i>

                                    Check Out

                                </button>

                            </form>

                        </div>

                    </div>

                </div>

            </div>

            <!-- ================= HISTORY ================= -->

            <div class="card shadow border-0">

                <div class="card-header fw-bold">

                    Attendance History

                </div>

                <div class="card-body">

                    <table class="table table-hover table-bordered">

                        <thead class="table-dark">

                        <tr>

                            <th>Date</th>
                            <th>Check In</th>
                            <th>Check Out</th>
                            <th>Status</th>
                            <th>Location</th>

                        </tr>

                        </thead>

                        <tbody>

                        <tr th:each="history : ${histories}">

                            <td th:text="${history.attendanceDate}"></td>

                            <td th:text="${#temporals.format(history.checkInTime,'HH:mm')}"></td>
                            <td th:text="${history.checkOutTime != null ?
                                        #temporals.format(history.checkOutTime,'HH:mm') : '-'}"></td>
                            <td th:text="${history.status}"></td>
                            <td th:text="${history.location}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
        </div>
    </div>
</div>
<script src="/webjars/jquery/jquery.min.js"></script>
<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
<script>

    document.getElementById("checkInForm").addEventListener("submit", function(e){

        e.preventDefault();

        if(!navigator.geolocation){
            alert("Browser tidak mendukung GPS");
            return;
        }

        navigator.geolocation.getCurrentPosition(

            function(position){

                const latitude = position.coords.latitude;
                const longitude = position.coords.longitude;

                document.getElementById("location").value =
                    latitude + "," + longitude;

                document.getElementById("checkInForm").submit();
            },

            function(error){

                alert("Silakan izinkan akses lokasi terlebih dahulu.");

            }

        );

    });

</script>
</body>
</html>
