<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/webjars/bootstrap/css/bootstrap.min.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .table-custom-rounded {
            border-radius: 1rem;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        .table-custom-rounded th {
            background-color: #f8fafc;
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            padding: 1rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .table-custom-rounded td {
            padding: 1rem;
            vertical-align: middle;
            color: #334155;
            font-size: 0.9rem;
            border-bottom: 1px solid #f1f5f9;
        }

        .custom-scroll::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .btn-action {
            transition: all 0.2s ease;
        }
        .btn-action:hover {
            transform: translateY(-2px);
        }

        .form-control {
            border-radius: 0.5rem;
            border: 1px solid #e2e8f0;
            padding: 0.6rem 1rem;
            font-size: 0.9rem;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(59, 130, 246, 0.15);
            border-color: #93c5fd;
        }
    </style>
</head>

<body class="overflow-hidden">

<div class="d-flex vh-100 w-100">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="flex-grow-1 d-flex flex-column h-100 overflow-hidden bg-light">

        <div class="flex-shrink-0" style="z-index: 1030;">
            <div th:replace="~{fragments/navbar :: navbar}"></div>
        </div>

        <div class="p-4 p-md-5 overflow-auto flex-grow-1 custom-scroll" style="background-color: #f8fafc;">

            <div class="mb-4 d-flex justify-content-between align-items-center">
                <div>
                    <h3 class="fw-bold text-dark mb-1">Employee List</h3>
                    <p class="text-muted mb-0" style="font-size: 0.95rem;">Manage your organization's employees</p>
                </div>

                <a href="/employees/create" class="btn btn-primary px-4 fw-medium shadow-sm rounded-3 d-flex align-items-center" style="background-color: #2563eb; border-color: #2563eb;">
                    <i class="bi bi-plus-lg me-2"></i> Add Employee
                </a>
            </div>

            <div class="card shadow-sm border-0 rounded-4 bg-white mb-5">
                <div class="card-body p-4">

                    <form method="get" th:action="@{/employees}" class="row g-3 mb-4 align-items-end">
                        <div class="col-md-3">
                            <label class="form-label text-muted fw-medium" style="font-size: 0.85rem;">Global Search</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0 text-muted" style="border-radius: 0.5rem 0 0 0.5rem;"><i class="bi bi-search"></i></span>
                                <input type="text" name="keyword" class="form-control border-start-0 ps-0" placeholder="Search employee..." style="border-radius: 0 0.5rem 0.5rem 0;">
                            </div>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label text-muted fw-medium" style="font-size: 0.85rem;">Employee Code</label>
                            <input type="text" name="employeeCode" class="form-control" placeholder="e.g. EMP001">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label text-muted fw-medium" style="font-size: 0.85rem;">Full Name</label>
                            <input type="text" name="fullName" class="form-control" placeholder="Employee Name">
                        </div>

                        <div class="col-md-2">
                            <button type="submit" class="btn btn-dark w-100 fw-medium rounded-3 py-2 shadow-sm">
                                Filter Results
                            </button>
                        </div>
                    </form>

                    <div class="table-responsive table-custom-rounded bg-white">
                        <table class="table table-borderless align-middle mb-0">
                            <thead>
                            <tr>
                                <th class="ps-4">ID</th>
                                <th>Employee Code</th>
                                <th>Full Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th class="text-center">Action</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${#lists.isEmpty(employees)}">
                                <td colspan="6" class="text-center text-muted py-5">
                                    <div class="d-flex flex-column align-items-center">
                                        <i class="bi bi-person-x text-secondary opacity-50 mb-3" style="font-size: 3rem;"></i>
                                        <p class="mb-0 fw-medium">No employee records found.</p>
                                    </div>
                                </td>
                            </tr>

                            <tr th:each="emp : ${employees}">
                                <td class="ps-4 text-muted fw-medium" th:text="${emp.id}"></td>
                                <td>
                                    <span class="badge bg-light text-dark border px-2 py-1 rounded-2 fw-medium" th:text="${emp.employeeCode}"></span>
                                </td>
                                <td class="fw-bold text-dark" th:text="${emp.fullName}"></td>
                                <td>
                                    <a th:href="'mailto:' + ${emp.email}" class="text-decoration-none text-muted" th:text="${emp.email}"></a>
                                </td>
                                <td class="text-muted" th:text="${emp.phone}"></td>
                                <td class="text-center">
                                    <div class="d-flex justify-content-center gap-2">
                                        <a class="btn btn-sm btn-action rounded-3"
                                           style="background-color: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe;"
                                           th:href="@{'/employees/edit/' + ${emp.id}}" title="Edit">
                                            <i class="bi bi-pencil-square"></i>
                                        </a>
                                        <a class="btn btn-sm btn-action rounded-3"
                                           style="background-color: #fef2f2; color: #dc2626; border: 1px solid #fecaca;"
                                           th:href="@{'/employees/delete/' + ${emp.id}}"
                                           onclick="return confirm('Are you sure you want to delete this employee?')" title="Delete">
                                            <i class="bi bi-trash3"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                        <nav th:if="${employeePage != null}">
                            <ul class="pagination justify-content-center">

                                <li class="page-item"
                                    th:classappend="${employeePage.first} ? 'disabled'">

                                    <a class="page-link"
                                       th:href="@{/employees(page=${employeePage.number-1},size=${employeePage.size})}">
                                        Previous
                                    </a>

                                </li>

                                <li class="page-item"
                                    th:each="i : ${#numbers.sequence(0, employeePage.totalPages-1)}"
                                    th:classappend="${i==employeePage.number} ? 'active'">

                                    <a class="page-link"
                                       th:text="${i+1}"
                                       th:href="@{/employees(page=${i},size=${employeePage.size})}">
                                    </a>

                                </li>

                                <li class="page-item"
                                    th:classappend="${employeePage.last} ? 'disabled'">

                                    <a class="page-link"
                                       th:href="@{/employees(page=${employeePage.number+1},size=${employeePage.size})}">
                                        Next
                                    </a>

                                </li>

                            </ul>
                        </nav>
                    </div>

                </div>
            </div>
            <div class="pb-5"></div>

        </div>

    </div>

</div>

<!-- Scripts -->
<script src="/webjars/jquery/jquery.min.js"></script>
<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>

</body>
</html>
