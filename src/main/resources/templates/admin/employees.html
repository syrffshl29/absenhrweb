<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Employee Management</title>

    <link rel="stylesheet"
          href="/webjars/bootstrap/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">

<div class="d-flex">

    <!-- SIDEBAR -->
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <!-- CONTENT -->
    <div class="flex-grow-1 container mt-4">

        <div class="d-flex justify-content-between align-items-center mb-3">

            <h3>Employee List</h3>
            <form method="get"
                  th:action="@{/admin/employees}"
                  class="row g-2 mb-3">

                <div class="col-md-4">
                    <input type="text"
                           name="keyword"
                           class="form-control"
                           placeholder="Search employee...">
                </div>

                <div class="col-md-3">
                    <input type="text"
                           name="employeeCode"
                           class="form-control"
                           placeholder="Employee Code">
                </div>

                <div class="col-md-3">
                    <input type="text"
                           name="fullName"
                           class="form-control"
                           placeholder="Full Name">
                </div>

                <div class="col-md-2 d-grid">
                    <button class="btn btn-primary">
                        Search
                    </button>
                </div>

            </form>

            <a href="/employees/create" class="btn btn-success">
                <i class="bi bi-plus"></i> Add Employee
            </a>

        </div>

        <div class="card shadow border-0">

            <div class="card-body">

                <table class="table table-hover table-bordered">

                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Employee Code</th>
                        <th>Full Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Action</th>
                    </tr>
                    </thead>

                    <tbody>

                    <!-- empty state -->
                    <tr th:if="${#lists.isEmpty(employees)}">
                        <td colspan="6" class="text-center">
                            No employee data
                        </td>
                    </tr>

                    <!-- data -->
                    <tr th:each="emp : ${employees}">

                        <td th:text="${emp.id}"></td>
                        <td th:text="${emp.employeeCode}"></td>
                        <td th:text="${emp.fullName}"></td>
                        <td th:text="${emp.email}"></td>
                        <td th:text="${emp.phone}"></td>

                        <td>
                            <a class="btn btn-sm btn-primary"
                               th:href="@{'/employees/edit/' + ${emp.id}}">
                                Edit
                            </a>

                            <a class="btn btn-sm btn-danger"
                               th:href="@{'/employees/delete/' + ${emp.id}}"
                               onclick="return confirm('Are you sure you want to delete this employee?')">

                                <i class="bi bi-trash"></i>
                                Delete

                            </a>
                        </td>

                    </tr>

                    </tbody>

                </table>
                <!-- Pagination -->

            </div>

        </div>

    </div>

</div>

<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>

</body>
</html>
