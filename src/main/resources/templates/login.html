<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - HR Attendance</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-header text-center">
                    <h3>HR Attendance</h3>
                </div>

                <div class="card-body">

                    <div
                            th:if="${error}"
                            class="alert alert-danger"
                            th:text="${error}">
                    </div>

                    <form
                            th:action="@{/login}"
                            th:object="${loginRequest}"
                            method="post">

                        <div class="mb-3">

                            <label class="form-label">
                                Username
                            </label>

                            <input
                                    type="text"
                                    th:field="*{username}"
                                    class="form-control">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Password
                            </label>

                            <input
                                    type="password"
                                    th:field="*{password}"
                                    class="form-control">

                        </div>

                        <button
                                type="submit"
                                class="btn btn-primary w-100">

                            Login

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
